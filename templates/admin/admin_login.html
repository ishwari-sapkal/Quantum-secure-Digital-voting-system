<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nagar Palika Admin Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">

</head>

<body>

<div class="login-container">

<h2>Nagar Palika Election Panel</h2>

<p class="subtitle">Chief Election Administrator Login</p>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('admin_login') }}">

<input
type="email"
name="email"
placeholder="Official Email"
required

>

<input
type="text"
name="phone"
placeholder="Registered Phone Number"
required

>

<input
type="password"
name="password"
placeholder="Password"
required

>

<button type="submit">Login & Verify OTP</button>

</form>

<div class="links">

<a class="home-link" href="{{ url_for('home') }}">← Back to Home</a>

</div>

</div>

</body>

</html>
