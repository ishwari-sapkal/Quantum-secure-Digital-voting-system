<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin OTP Verification</title>
<style>
  /* Full-screen subtle gradient background */
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1b3b2f, #236152); /* subtle royal green blend */
    color: #ffffff; /* text default white */
  }

  /* Centered OTP card */
  .container {
    background-color: #1e4d3b; /* slightly lighter than background */
    padding: 50px 45px;
    border-radius: 16px;
    width: 400px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  }

  /* Heading */
  h2 {
    color: #ffffff; /* white heading */
    margin-bottom: 12px;
    font-weight: 700;
  }

  /* Subtitle */
  .subtitle {
    font-size: 14px;
    color: #ffffffaa; /* slightly transparent white for subtitle */
    margin-bottom: 25px;
  }

  /* Flash messages */
  .flash {
    background: rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    color: #ffffff;
    font-weight: 600;
  }

  /* OTP input */
  .otp-input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    letter-spacing: 4px;
    border-radius: 8px;
    border: 1px solid #2f6b50;
    background-color: #1b4f3a;
    color: #ffffff; /* input text white */
    text-align: center;
    margin-bottom: 20px;
  }

  .otp-input::placeholder {
    color: #ffffffaa; /* placeholder slightly transparent white */
  }

  /* Button */
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background-color: #d4af37; /* subtle golden */
    color: #1e4d3b; /* dark green text */
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
  }

  button:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
  }

  /* Responsive adjustments */
  @media(max-width: 400px){
    .container { width: 90%; padding: 30px 20px; }
    h2 { font-size: 28px; }
    .otp-input { font-size: 16px; letter-spacing: 3px; padding: 10px; }
    button { font-size: 14px; padding: 10px; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>OTP Verification</h2>
  <p class="subtitle">Enter the OTP sent to Admin Phone</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <input class="otp-input" type="text" name="otp" placeholder="Enter 6 Digit OTP" maxlength="6" required>
    <button type="submit">Verify OTP</button>
  </form>
</div>

</body>
</html>
