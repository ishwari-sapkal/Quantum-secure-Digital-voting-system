<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Election Notice Board</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef4f8;
margin:0;
}

/* HEADER */
header{
background:#1e3c72;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:600;
}

/* MOVING TEXT */
.marquee{
width:100%;
overflow:hidden;
background:#f1f6ff;
border-bottom:2px solid #1e3c72;
}

.marquee span{
display:inline-block;
padding:10px;
color:#1e3c72;
font-weight:600;
animation:moveText 12s linear infinite;
}

@keyframes moveText{
from{transform:translateX(100%)}
to{transform:translateX(-100%)}
}

/* NOTICE AREA */
.notice-container{
width:900px;
margin:40px auto;
}

/* CARD */
.notice-card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.notice-card:hover{
transform:translateY(-5px);
}

/* TITLE */
.notice-card h2{
color:#1e3c72;
margin-bottom:10px;
}

/* IMAGE */
.notice-card img{
max-width:100%;
width:300px;
margin-top:15px;
border-radius:10px;
}

/* PDF VIEW */
.notice-card iframe{
width:100%;
height:320px;
margin-top:15px;
border-radius:10px;
border:none;
}

/* PDF BUTTON */
.pdf-btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:#1e3c72;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.pdf-btn:hover{
background:#16305a;
}

/* DATE */
.notice-date{
margin-top:15px;
font-size:13px;
color:gray;
}

/* EMPTY */
.empty{
text-align:center;
font-size:18px;
color:#555;
margin-top:50px;
}

</style>

</head>

<body>

<header>
Election Notice Board
</header>

<div class="marquee">
<span>Secure Digital Voting • Election Updates • Transparent Elections • Voter Awareness</span>
</div>

<div class="notice-container" id="noticeContainer">
Loading notices...
</div>

<script>

function loadNotices(){

fetch("/get_notices")

.then(res => res.json())

.then(data => {

let html="";

if(data.length === 0){
html="<div class='empty'>No notices available</div>";
}

data.forEach(n => {

let fileHTML = "";

// 📁 FILE HANDLING
if(n.image){

    if(n.image.endsWith(".png") || n.image.endsWith(".jpg") || n.image.endsWith(".jpeg")){

        // 🖼️ IMAGE
        fileHTML = `<img src="${n.image}">`;

    } else if(n.image.endsWith(".pdf")){

        // 📄 PDF
        fileHTML = `
            <a class="pdf-btn" href="${n.image}" target="_blank">📄 View / Download PDF</a>
            <iframe src="${n.image}"></iframe>
        `;
    }
}

html += `

<div class="notice-card">

<h2>${n.title}</h2>

<p>${n.description}</p>

${fileHTML}

<div class="notice-date">
Published: ${n.createdAt}
</div>

</div>

`;

})

document.getElementById("noticeContainer").innerHTML = html

})

}

loadNotices()

</script>

</body>
</html>
